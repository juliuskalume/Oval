<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
  </style>
</head>
<body data-page="onboarding" class="bg-black min-h-screen text-white">
  <div class="phone bg-black flex flex-col justify-between">
    <div class="p-5">
      <div class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-white/10 border border-white/10 text-sm">
        <span class="material-symbols-outlined text-[18px]">rocket_launch</span>
        Oval
      </div>

      <div class="mt-10">
        <h1 class="text-4xl font-bold leading-tight">Find work, gigs, and scholarships faster.</h1>
        <p class="text-white/50 mt-4 text-lg">Choose how you want to use Oval.</p>
      </div>

      <div class="mt-8 space-y-4">
        <button type="button" data-role="seeker">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-xl font-bold">I'm looking for opportunities</h2>
              <p class="mt-2 text-sm opacity-70">Discover jobs, internships, gigs, and scholarships in a swipe-first feed.</p>
            </div>
            <span class="material-symbols-outlined shrink-0">arrow_forward</span>
          </div>
        </button>

        <button type="button" data-role="creator">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-xl font-bold">I want to post opportunities</h2>
              <p class="mt-2 text-sm opacity-70">Create posts, track views, and manage applications with creator tools.</p>
            </div>
            <span class="material-symbols-outlined shrink-0">arrow_forward</span>
          </div>
        </button>
      </div>

      <div data-creator-type-row class="hidden mt-5">
        <p class="text-sm text-white/50 mb-3">If you're creating opportunities, choose your profile type.</p>
        <div class="flex flex-wrap gap-2">
          <button type="button" data-creator-type="individual">Individual creator</button>
          <button type="button" data-creator-type="company">Company</button>
        </div>
      </div>

      <div class="mt-5 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white/70">
        Selected account type: <span data-role-preview class="font-semibold text-white">Seeker</span>
      </div>
    </div>

    <div class="p-5 space-y-3">
      <a data-auth-link href="sign-in-email.html" class="block w-full bg-white text-black rounded-2xl py-4 font-semibold text-center">Continue with email</a>
      <a data-auth-link href="sign-in-google.html" class="block w-full bg-white/10 border border-white/10 rounded-2xl py-4 font-semibold text-center">Continue with Google</a>
      <div class="pt-1 text-center">
        <a data-skip-link href="feed.html" class="text-xs text-white/45 hover:text-white/70 transition">Skip</a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
