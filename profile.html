<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="profile" class="bg-black min-h-screen text-white">
  <div class="phone bg-black">
    <div class="flex items-center justify-between px-4 pt-5 pb-4">
      <button id="profileSignOut" type="button" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">logout</span>
      </button>
      <h1 id="profileHandle" class="font-semibold"></h1>
      <a href="settings-notifications.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">settings</span>
      </a>
    </div>

    <div class="px-4 text-center">
      <img id="profileAvatar" src="" class="w-24 h-24 rounded-full mx-auto object-cover" alt="Profile" />
      <h2 id="profileName" class="mt-4 text-lg font-bold"></h2>
      <p id="profileBio" class="text-sm text-white/60 mt-1"></p>

      <div class="flex justify-center gap-8 mt-5 text-center">
        <div><p id="profilePostsCount" class="font-bold text-lg">0</p><p class="text-xs text-white/50">Posts</p></div>
        <div><p id="profileSavedCount" class="font-bold text-lg">0</p><p class="text-xs text-white/50">Saved</p></div>
        <div><p id="profileAppliedCount" class="font-bold text-lg">0</p><p class="text-xs text-white/50">Applied</p></div>
      </div>

      <div class="flex gap-3 mt-5">
        <a href="saved-posts.html" class="flex-1 bg-white text-black font-semibold rounded-xl py-3">Saved posts</a>
        <a id="creatorDashboardLink" href="creator-dashboard.html" class="px-4 border border-white/20 rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined">bar_chart</span>
        </a>
      </div>
    </div>

    <div class="grid grid-cols-3 mt-6 border-b border-white/10 text-center text-sm">
      <button data-profile-tab="posts" class="py-3 border-b-2 border-white font-semibold flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[18px]">grid_view</span>Posts
      </button>
      <button data-profile-tab="saved" class="py-3 text-white/50 flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[18px]">bookmark</span>Saved
      </button>
      <button data-profile-tab="applied" class="py-3 text-white/50 flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[18px]">task_alt</span>Applied
      </button>
    </div>

    <div class="px-4 py-4 pb-28 space-y-4">
      <div id="profileStatus" class="hidden"></div>
      <div id="profileTabContent" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto border-t border-white/10 bg-black/90 backdrop-blur z-30">
      <div class="grid grid-cols-5 text-center py-3 text-[11px]">
        <a href="feed.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">home</span>
          <span>Home</span>
        </a>
        <a href="search.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">search</span>
          <span>Search</span>
        </a>
        <a data-create-nav href="create-post.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[28px] leading-none bg-white text-black px-2 rounded-md">add</span>
        </a>
        <a href="saved-posts.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">bookmark</span>
          <span>Saved</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[22px] leading-none">person</span>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
