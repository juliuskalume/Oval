<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Admin Moderation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .active-chip { background: white; color: black; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="admin-moderation" class="bg-zinc-950 min-h-screen text-white">
  <div class="max-w-6xl mx-auto min-h-screen px-4 py-6">
    <div class="rounded-[28px] border border-white/10 bg-black overflow-hidden">
      <div class="px-6 py-5 border-b border-white/10 flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold">Admin moderation panel</h1>
          <p class="text-white/50 text-sm mt-1">Approve pending posts before they become visible publicly.</p>
        </div>
        <a href="feed.html" class="px-4 py-2 rounded-xl bg-white/10 border border-white/10 whitespace-nowrap">Back to feed</a>
      </div>

      <div class="grid lg:grid-cols-[280px,1fr]">
        <div class="border-r border-white/10 p-4 space-y-3">
          <div class="rounded-2xl bg-white text-black p-4">
            <p class="text-sm">Pending review</p>
            <p id="moderationPendingCount" class="text-3xl font-bold mt-2">0</p>
          </div>
          <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
            <p class="text-sm text-white/60">Live posts</p>
            <p id="moderationPublishedCount" class="text-2xl font-bold mt-2">0</p>
          </div>
          <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
            <p class="text-sm text-white/60">Archived posts</p>
            <p id="moderationArchivedCount" class="text-2xl font-bold mt-2">0</p>
          </div>
        </div>

        <div class="p-4 md:p-6">
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="chip active-chip px-4 py-2 rounded-full text-sm">Pending queue</span>
            <span class="chip px-4 py-2 rounded-full text-sm">Approve to publish</span>
            <span class="chip px-4 py-2 rounded-full text-sm">Archive to hide</span>
          </div>

          <div id="moderationStatus" class="hidden mb-4"></div>
          <div id="moderationQueue" class="space-y-4">
            <div class="rounded-3xl bg-white/5 border border-white/10 p-6 text-sm text-white/60">
              Loading pending posts...
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
