<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Sign in with Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles/material-symbols.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="sign-in-email" class="bg-black min-h-screen text-white">
  <div class="phone bg-black flex flex-col justify-between">
    <div class="px-5 pb-5 safe-top-5">
      <a href="onboarding.html" class="inline-flex w-10 h-10 rounded-full bg-white/5 items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>

      <div class="mt-8">
        <div class="flex gap-2 mb-5">
          <button type="button" data-auth-mode="signin">Sign in</button>
          <button type="button" data-auth-mode="create">Create account</button>
        </div>
        <h1 id="emailAuthTitle" class="text-3xl font-bold">Sign in with email</h1>
        <p id="emailAuthSubtitle" class="text-white/50 mt-2">Access saved posts, applied opportunities, and posting tools.</p>
      </div>

      <form id="emailAuthForm" class="mt-6 space-y-4">
        <div data-create-only class="hidden">
          <label for="displayName" class="block text-sm text-white/70 mb-2">Display name</label>
          <input id="displayName" name="displayName" type="text" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-white placeholder:text-white/30 outline-none" placeholder="Your name or organization" />
        </div>

        <div>
          <label for="email" class="block text-sm text-white/70 mb-2">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-white placeholder:text-white/30 outline-none" placeholder="you@example.com" required />
        </div>

        <div>
          <label for="password" class="block text-sm text-white/70 mb-2">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-white placeholder:text-white/30 outline-none" placeholder="At least 6 characters" required />
        </div>

        <div id="emailAuthStatus" class="hidden"></div>

        <button id="emailAuthSubmit" type="submit" class="w-full bg-white text-black rounded-2xl py-4 font-semibold">Sign in</button>
      </form>
    </div>

    <div class="p-5 text-center text-white/50 text-sm">
      Or use <a data-google-onboarding-link href="onboarding.html" class="text-white underline">Google sign-in</a>
      <div class="mt-3">
        <a data-skip-link href="feed.html" class="text-xs text-white/45 hover:text-white/70 transition">Skip</a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
