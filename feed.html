<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles/material-symbols.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .glass { background: rgba(0,0,0,.6); backdrop-filter: blur(12px); }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="feed" class="bg-black text-white min-h-screen">
  <div class="phone">
    <div id="feedTopBar" class="absolute top-0 left-0 right-0 z-30 px-4 safe-top-5">
      <div class="flex items-center justify-between">
        <div class="w-10 h-10"></div>
        <div class="flex items-center gap-5 text-sm font-semibold">
          <button type="button" data-feed-mode="following" class="text-white/60">Following</button>
          <button type="button" data-feed-mode="for-you" class="text-white border-b-2 border-white pb-1">For You</button>
        </div>
        <a href="search.html" class="h-10 inline-flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-[20px]">search</span>
        </a>
      </div>
    </div>

    <div id="feedSlides" class="h-screen overflow-y-auto snap-y snap-mandatory hide-scrollbar"></div>

    <div id="feedStatus" class="hidden absolute left-4 right-4 z-40 safe-feed-status"></div>

    <div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto border-t border-white/10 bg-black/90 backdrop-blur z-40">
      <div class="grid grid-cols-5 text-center py-3 text-[11px] safe-bottom-nav">
        <a href="feed.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[22px] leading-none">home</span>
          <span>Home</span>
        </a>
        <a href="search.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">search</span>
          <span>Search</span>
        </a>
        <a data-create-nav href="create-post.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[28px] leading-none bg-white text-black px-2 rounded-md">add</span>
        </a>
        <a href="inbox.html" data-nav-inbox class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">inbox</span>
          <span>Inbox</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">person</span>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
