<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Comments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles/material-symbols.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="comments" class="bg-black min-h-screen text-white">
  <div class="phone flex flex-col bg-zinc-950">
    <div class="px-4 pb-4 safe-top-4 border-b border-white/10 flex items-center justify-between gap-3">
      <a id="commentsBackLink" href="feed.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <div class="flex-1 text-center min-w-0">
        <h1 id="commentsHeading" class="font-semibold">Comments</h1>
        <p id="commentsSubheading" class="text-xs text-white/50 mt-1 truncate"></p>
      </div>
      <div class="w-10 h-10"></div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-4 pb-48 space-y-4 hide-scrollbar">
      <div id="commentsStatus" class="hidden"></div>
      <div id="commentsOpportunityCard" class="hidden rounded-3xl bg-white/5 border border-white/10 p-4"></div>
      <div id="commentsList" class="space-y-4"></div>
    </div>

    <div class="border-t border-white/10 px-4 pt-3 safe-bottom-4 bg-black/90 backdrop-blur">
      <div id="commentsComposerGate" class="hidden"></div>
      <form id="commentForm" class="space-y-3">
        <div id="commentReplyBanner" class="hidden"></div>
        <div class="flex items-end gap-3">
          <img id="commentAuthorAvatar" src="" class="w-10 h-10 rounded-full object-cover" alt="Your avatar" />
          <div class="flex-1 rounded-3xl bg-white/10 border border-white/10 px-4 py-3">
            <textarea id="commentBody" rows="1" maxlength="280" class="w-full min-h-[24px] max-h-36 bg-transparent text-sm text-white placeholder:text-white/35 outline-none resize-none" placeholder="Ask a question or share something helpful."></textarea>
            <div class="mt-3 flex items-center justify-between gap-3 text-xs text-white/45">
              <span id="commentCount">0/280</span>
            </div>
          </div>
          <button id="commentSubmit" type="submit" class="theme-primary h-12 px-4 rounded-2xl font-semibold shrink-0">Send</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
