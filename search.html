<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .active-chip { background: white; color: black; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
</head>
<body data-page="search" class="bg-black min-h-screen text-white">
  <div class="phone bg-black">
    <div class="sticky top-0 z-20 bg-black px-4 pt-5 pb-4 border-b border-white/10">
      <div class="flex items-center gap-3">
        <a href="feed.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex-1 bg-white/10 rounded-full px-4 py-3 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px] text-white/60">search</span>
          <input id="searchInput" type="search" placeholder="Search jobs, scholarships, gigs" class="w-full bg-transparent text-sm text-white placeholder:text-white/50 outline-none" />
        </div>
      </div>

      <div class="flex gap-2 overflow-x-auto hide-scrollbar mt-4 text-sm">
        <button data-filter="All" class="chip active-chip px-4 py-2 rounded-full whitespace-nowrap">All</button>
        <button data-filter="Job" class="chip px-4 py-2 rounded-full whitespace-nowrap">Jobs</button>
        <button data-filter="Internship" class="chip px-4 py-2 rounded-full whitespace-nowrap">Internships</button>
        <button data-filter="Scholarship" class="chip px-4 py-2 rounded-full whitespace-nowrap">Scholarships</button>
        <button data-filter="Remote" class="chip px-4 py-2 rounded-full whitespace-nowrap">Remote</button>
      </div>
    </div>

    <div class="px-4 py-4 pb-28 space-y-4">
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
          <div class="flex items-center gap-2 text-white/70 mb-2"><span class="material-symbols-outlined text-[18px]">payments</span>Budget</div>
          <div class="font-semibold">$450 - $3,000+</div>
        </div>
        <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
          <div class="flex items-center gap-2 text-white/70 mb-2"><span class="material-symbols-outlined text-[18px]">location_on</span>Location</div>
          <div class="font-semibold">Remote / Hybrid / Global</div>
        </div>
      </div>

      <div id="searchStatus" class="hidden"></div>
      <div id="searchResults" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto border-t border-white/10 bg-black/90 backdrop-blur z-30">
      <div class="grid grid-cols-5 text-center py-3 text-[11px]">
        <a href="feed.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">home</span>
          <span>Home</span>
        </a>
        <a href="search.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[22px] leading-none">search</span>
          <span>Search</span>
        </a>
        <a data-create-nav href="create-post.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[28px] leading-none bg-white text-black px-2 rounded-md">add</span>
        </a>
        <a href="saved-posts.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">bookmark</span>
          <span>Saved</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px] leading-none">person</span>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
