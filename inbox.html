<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles/material-symbols.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .active-chip { background: white; color: black; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="inbox" class="bg-black text-white min-h-screen">
  <div class="phone flex flex-col bg-black">
    <div class="sticky top-0 z-20 bg-black border-b border-white/10 px-4 pb-4 safe-top-5">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold">Inbox</h1>
          <p class="text-sm text-white/50 mt-1">Updates on saved posts, applied opportunities, and creator activity</p>
        </div>
        <a href="feed.html" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
      </div>

      <div class="flex gap-2 overflow-x-auto hide-scrollbar mt-4 text-sm">
        <button data-inbox-filter="all" class="chip active-chip px-4 py-2 rounded-full whitespace-nowrap">All</button>
        <button data-inbox-filter="comments" class="chip px-4 py-2 rounded-full whitespace-nowrap">Comments</button>
        <button data-inbox-filter="opportunities" class="chip px-4 py-2 rounded-full whitespace-nowrap">Opportunities</button>
        <button data-inbox-filter="system" class="chip px-4 py-2 rounded-full whitespace-nowrap">System</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-4 pb-28 space-y-3 hide-scrollbar">
      <div id="notificationsList" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto border-t border-white/10 bg-black/90 backdrop-blur">
      <div class="grid grid-cols-5 text-center py-3 text-[11px] safe-bottom-nav">
        <a href="feed.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px]">home</span>
          <span>Home</span>
        </a>
        <a href="search.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px]">search</span>
          <span>Search</span>
        </a>
        <a data-create-nav href="create-post.html" class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[28px] bg-white text-black px-2 rounded-md">add</span>
        </a>
        <a href="inbox.html" data-nav-inbox class="flex flex-col items-center gap-1 text-white">
          <span class="material-symbols-outlined text-[22px]">inbox</span>
          <span>Inbox</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-white/60">
          <span class="material-symbols-outlined text-[22px]">person</span>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
