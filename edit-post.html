<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Edit Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 390px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .glass { background: rgba(0,0,0,.6); backdrop-filter: blur(12px); }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    .active-chip { background: white; color: black; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
  
</head>
<body class="bg-black min-h-screen text-white">
  <div class="phone bg-black flex flex-col">
    <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
      <a href="creator-dashboard.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <h1 class="font-semibold">Edit post</h1>
      <button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">delete</span>
      </button>
    </div>

    <div class="p-4 pb-8 space-y-4">
      <div class="rounded-3xl overflow-hidden bg-white/5 border border-white/10">
        <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80" class="w-full h-56 object-cover" alt="">
      </div>

      <div>
        <label class="block text-sm text-white/70 mb-2">Title</label>
        <div class="bg-white/10 rounded-2xl px-4 py-3 text-sm">Frontend Intern at RemoteFirst HQ</div>
      </div>
      <div>
        <label class="block text-sm text-white/70 mb-2">Caption</label>
        <div class="bg-white/10 rounded-2xl px-4 py-4 text-sm min-h-[120px]">Hiring: Junior Frontend Developer in Istanbul. Flexible hours, React preferred, portfolio welcome.</div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white/10 rounded-2xl px-4 py-3 text-sm flex items-center justify-between"><span>Status</span><span class="text-green-400">Active</span></div>
        <div class="bg-white/10 rounded-2xl px-4 py-3 text-sm flex items-center justify-between"><span>Deadline</span><span class="text-white/60">May 12</span></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button class="bg-white/10 rounded-2xl py-4 font-medium border border-white/10">Pause listing</button>
        <button class="bg-white text-black rounded-2xl py-4 font-semibold">Save changes</button>
      </div>
    </div>
  </div>
</body>
</html>
