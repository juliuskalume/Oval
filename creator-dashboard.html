<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Creator Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="creator-dashboard" class="bg-black min-h-screen text-white">
  <div class="phone bg-black">
    <div class="px-4 pt-5 pb-4 border-b border-white/10 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="profile.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
          <h1 class="text-lg font-bold">Creator dashboard</h1>
          <p class="text-white/50 text-sm">Track your posts and applied signals</p>
        </div>
      </div>
      <a href="create-post.html" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-black">
        <span class="material-symbols-outlined">add</span>
      </a>
    </div>

    <div class="px-4 py-4 pb-10 space-y-4">
      <div class="grid grid-cols-3 gap-3">
        <div class="rounded-3xl bg-white/5 border border-white/10 p-4">
          <p class="text-white/50 text-sm">Views</p>
          <p id="dashboardViews" class="text-2xl font-bold mt-2">0</p>
        </div>
        <div class="rounded-3xl bg-white/5 border border-white/10 p-4">
          <p class="text-white/50 text-sm">Applied</p>
          <p id="dashboardApplications" class="text-2xl font-bold mt-2">0</p>
        </div>
        <div class="rounded-3xl bg-white/5 border border-white/10 p-4">
          <p class="text-white/50 text-sm">Saves</p>
          <p id="dashboardSaves" class="text-2xl font-bold mt-2">0</p>
        </div>
      </div>

      <div class="rounded-3xl bg-white/5 border border-white/10 p-4">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">Your published opportunities</h2>
          <span class="material-symbols-outlined">insights</span>
        </div>
        <div id="dashboardPosts" class="space-y-3 mt-4"></div>
      </div>

      <div class="rounded-3xl bg-white/5 border border-white/10 p-4">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">Performance snapshot</h2>
          <span class="material-symbols-outlined">conversion_path</span>
        </div>
        <div class="space-y-3 mt-4 text-sm">
          <div>
            <div class="flex justify-between mb-1"><span>Views</span><span id="funnelViewsValue">0</span></div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden"><div id="funnelViewsFill" class="h-full w-0 bg-white rounded-full"></div></div>
          </div>
          <div>
            <div class="flex justify-between mb-1"><span>Saves</span><span id="funnelSavesValue">0</span></div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden"><div id="funnelSavesFill" class="h-full w-0 bg-white/80 rounded-full"></div></div>
          </div>
          <div>
            <div class="flex justify-between mb-1"><span>Applied</span><span id="funnelAppliedValue">0</span></div>
            <div class="h-2 bg-white/10 rounded-full overflow-hidden"><div id="funnelAppliedFill" class="h-full w-0 bg-white/60 rounded-full"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
