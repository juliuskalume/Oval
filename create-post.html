<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oval - Create Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles/material-symbols.css" />
  <style>
    body { font-family: Inter, sans-serif; }
    .phone { max-width: 760px; margin: 0 auto; min-height: 100vh; background: #000; position: relative; overflow: hidden; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body data-page="create-post" class="bg-black min-h-screen text-white">
  <div class="phone bg-black flex flex-col">
    <div class="px-4 pb-4 safe-top-4 flex items-center justify-between border-b border-white/10">
      <a href="feed.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
        <span class="material-symbols-outlined">close</span>
      </a>
      <div class="text-center">
        <h1 id="createPostHeading" class="font-semibold">Create post</h1>
        <p id="createPostSubheading" class="text-xs text-white/50 mt-1">Submit an opportunity with external application details for review.</p>
      </div>
      <a href="creator-dashboard.html" class="text-sm text-white/60 font-medium">Dashboard</a>
    </div>

    <div class="flex-1 p-4 pb-10 space-y-4 overflow-y-auto hide-scrollbar">
      <div id="createPostGate" class="hidden rounded-3xl border border-white/10 bg-white/5 p-6 text-sm text-white/70">
        Sign in to publish or edit opportunities.
      </div>

      <form id="createPostForm" class="space-y-4">
        <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
          <div class="grid gap-4 md:grid-cols-[220px,1fr]">
            <div class="space-y-3">
              <div id="coverPreview" class="w-full aspect-[4/5] rounded-3xl overflow-hidden bg-white/5"></div>
              <label class="block">
                <span class="block text-sm text-white/70 mb-2">Cover media</span>
                <input id="coverMedia" type="file" accept="image/*,video/*" class="w-full text-sm text-white/70 file:mr-3 file:rounded-xl file:border-0 file:bg-white file:px-4 file:py-2 file:text-black" />
              </label>
            </div>

            <div class="grid gap-4 md:grid-cols-2">
              <div class="md:col-span-2">
                <label for="title" class="block text-sm text-white/70 mb-2">Title</label>
                <input id="title" name="title" type="text" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none" placeholder="Frontend Intern at RemoteFirst HQ" required />
              </div>

              <div class="md:col-span-2">
                <label for="caption" class="block text-sm text-white/70 mb-2">Description</label>
                <textarea id="caption" name="caption" rows="4" maxlength="150" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="Write the opportunity summary in 150 characters or less. Add hashtags like #remote or #design." required></textarea>
                <div class="mt-2 flex items-center justify-between gap-3 text-xs text-white/45">
                  <p>Hashtags are picked up automatically from words that start with #.</p>
                  <span id="captionCount">0/150</span>
                </div>
              </div>

              <div class="md:col-span-2">
                <label for="applyUrl" class="block text-sm text-white/70 mb-2">Details URL</label>
                <input id="applyUrl" name="applyUrl" type="url" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none" placeholder="https://company.com/apply/frontend-intern" required />
              </div>

              <div>
                <label for="category" class="block text-sm text-white/70 mb-2">Category</label>
                <select id="category" name="category" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none">
                  <option value="Job" class="text-black">Job</option>
                  <option value="Internship" class="text-black">Internship</option>
                  <option value="Gig" class="text-black">Gig</option>
                  <option value="Scholarship" class="text-black">Scholarship</option>
                </select>
              </div>

              <div>
                <label for="workMode" class="block text-sm text-white/70 mb-2">Work style</label>
                <select id="workMode" name="workMode" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none">
                  <option value="Remote" class="text-black">Remote</option>
                  <option value="Hybrid" class="text-black">Hybrid</option>
                  <option value="On-site" class="text-black">On-site</option>
                  <option value="Remote-friendly" class="text-black">Remote-friendly</option>
                  <option value="Global" class="text-black">Global</option>
                </select>
              </div>

              <div>
                <label for="locationLabel" class="block text-sm text-white/70 mb-2">Location</label>
                <input id="locationLabel" name="locationLabel" type="text" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none" placeholder="Remote, Istanbul, Global" />
              </div>

              <div>
                <label for="payLabel" class="block text-sm text-white/70 mb-2">Compensation</label>
                <input id="payLabel" name="payLabel" type="text" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none" placeholder="$1,200/mo or $450 fixed" />
              </div>

              <div>
                <label for="deadlineAt" class="block text-sm text-white/70 mb-2">Deadline</label>
                <input id="deadlineAt" name="deadlineAt" type="date" class="w-full bg-white/10 rounded-2xl px-4 py-3 text-sm outline-none" />
              </div>
            </div>
          </div>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
            <label for="eligibility" class="block text-sm text-white/70 mb-2">Eligibility</label>
            <textarea id="eligibility" name="eligibility" rows="6" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="One item per line"></textarea>
          </div>

          <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
            <label for="requirements" class="block text-sm text-white/70 mb-2">Requirements</label>
            <textarea id="requirements" name="requirements" rows="6" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="One item per line"></textarea>
          </div>

          <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
            <label for="responsibilities" class="block text-sm text-white/70 mb-2">Responsibilities</label>
            <textarea id="responsibilities" name="responsibilities" rows="6" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="One item per line"></textarea>
          </div>

          <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
            <label for="perks" class="block text-sm text-white/70 mb-2">Perks</label>
            <textarea id="perks" name="perks" rows="6" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="One item per line"></textarea>
          </div>
        </div>

        <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
          <label for="aboutCompany" class="block text-sm text-white/70 mb-2">About the creator or company</label>
          <textarea id="aboutCompany" name="aboutCompany" rows="5" class="w-full bg-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="Add the background that should appear on the details page."></textarea>
        </div>

        <div class="rounded-3xl border border-white/10 bg-white/5 p-4 space-y-3">
          <div>
            <label for="attachments" class="block text-sm text-white/70 mb-2">Attachments</label>
            <input id="attachments" type="file" multiple class="w-full text-sm text-white/70 file:mr-3 file:rounded-xl file:border-0 file:bg-white file:px-4 file:py-2 file:text-black" />
          </div>
          <div id="existingAttachments" class="hidden space-y-3"></div>
        </div>

        <label class="flex items-center justify-between bg-white/10 rounded-2xl px-4 py-4 cursor-pointer">
          <div>
            <p class="text-sm font-medium">Allow comments</p>
            <p class="text-xs text-white/40">Applicants can ask questions publicly</p>
          </div>
          <input id="allowComments" name="allowComments" type="checkbox" class="h-5 w-5 rounded border-white/20 bg-transparent" checked />
        </label>

        <div id="createPostStatus" class="hidden"></div>

        <button id="deleteOpportunityButton" type="button" class="hidden w-full rounded-2xl border border-red-400/30 bg-red-500/15 py-4 font-semibold text-red-100">
          Delete post
        </button>

        <button id="publishOpportunityButton" type="submit" class="theme-primary w-full transition rounded-2xl py-4 font-semibold">
          Publish opportunity
        </button>
      </form>
    </div>
  </div>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
